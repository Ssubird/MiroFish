schema_version: 1
prompt_char_limit: 2800

phases:
  - phase_id: social_propagation
    active_groups: [social]
  - phase_id: plan_synthesis
    active_groups: [purchase]
  - phase_id: final_decision
    active_groups: [purchase]

groups:
  - group_id: social
    role_kind: social
    default_profile_id: social_default
    visible_groups: [data, metaphysics, hybrid, social]
    shared_memory_keys:
      - current_issue
      - visible_draw_history_digest
      - market_board
      - social_feed
      - report_digest
      - rule_digest
      - purchase_budget
  - group_id: purchase
    role_kind: purchase
    default_profile_id: purchase_default
    visible_groups: [data, metaphysics, hybrid, social, purchase]
    shared_memory_keys:
      - current_issue
      - visible_draw_history_digest
      - market_board
      - social_feed
      - purchase_board
      - final_decision_constraints
      - report_digest
      - rule_digest
      - purchase_budget
