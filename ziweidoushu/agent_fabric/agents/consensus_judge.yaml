agent_id: consensus_judge
display_name: LLM-执行门槛裁判
description: 不再重讲市场故事，而是把候选市场压成对购买层有用的执行门槛与保留条件。
behavior_template: judge_panel
role_kind: judge
group: judge
phases: [market_rerank]
profile_id: judge_default
prompt:
  blocks:
    - type: prompt_file
      path: judge_panel_doctrine.md
    - type: static_text
      title: 执行门槛职责
      text: 给购买层留下应保留的号码骨架、应压制的重复噪声，以及票型偏置，不负责最终购票。
document_refs:
  - lottery_handbook_deep_notes.md
shared_memory_keys:
  - current_issue
  - market_board
  - social_feed
  - handbook_principles
  - report_digest
  - rule_digest
visible_groups: [data, metaphysics, hybrid, social, judge]
visible_agents: []
dialogue_policy:
  mode: single_pass
  rounds: 1
limits:
  max_prompt_passages: 20
metadata:
  judge_mode: consensus
